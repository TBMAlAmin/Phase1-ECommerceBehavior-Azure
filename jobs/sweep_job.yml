$schema: https://azuremlschemas.azureedge.net/latest/sweepJob.schema.json
type: sweep

display_name: session_purchase_sweep
experiment_name: session_purchase_experiment

trial:
  code: ../src
  command: >-
    python train.py
    --train_data ${{inputs.train_data}}
    --val_data ${{inputs.val_data}}
    --test_data ${{inputs.test_data}}
    --output ${{outputs.model_output}}
    --n_estimators ${{search_space.n_estimators}}
    --max_depth ${{search_space.max_depth}}
  environment:
    image: mcr.microsoft.com/azureml/openmpi4.1.0-ubuntu20.04
    conda_file: ../env/conda.yml

inputs:
  train_data:
    type: uri_file
    path: azureml:session_train@latest
  val_data:
    type: uri_file
    path: azureml:session_val@latest
  test_data:
    type: uri_file
    path: azureml:session_test@latest

outputs:
  model_output:
    type: uri_folder

compute: azureml:cpu-cluster

sampling_algorithm: random

search_space:
  n_estimators:
    type: choice
    values: [50, 100, 200]
  max_depth:
    type: choice
    values: [5, 10, 15]

objective:
  primary_metric: val_accuracy
  goal: maximize

limits:
  max_total_trials: 6
  max_concurrent_trials: 2